server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Tipos MIME (normalmente ya vienen, pero lo dejamos explícito)
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logs (opcional)
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  # Performance básicos
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  # Gzip (Nginx no trae brotli por defecto; gzip ayuda bastante)
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    application/xml+rss
    text/javascript
    image/svg+xml;

  # 1) Assets con hash (Vite) => cache agresivo
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # 2) Archivos estáticos comunes
  location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    try_files $uri =404;
  }

  # 3) SPA fallback: cualquier ruta que no sea archivo real => index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}