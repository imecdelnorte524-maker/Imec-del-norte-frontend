<svg viewBox="0 0 512 520" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Sombra suave -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Documento -->
  <path d="M96 40
           H340
           L416 116
           V440
           H96
           Z"
        fill="#ffffff"
        filter="url(#shadow)"
        stroke="#e5e7eb"
        stroke-width="2"
        stroke-linejoin="round"/>

  <!-- Esquina doblada -->
  <path d="M340 40
           V116
           H416"
        fill="#f3f4f6"/>

  <!-- Líneas simulando texto -->
  <g stroke="#d1d5db" stroke-width="6" stroke-linecap="round">
    <line x1="130" y1="150" x2="380" y2="150"/>
    <line x1="130" y1="180" x2="360" y2="180"/>
    <line x1="130" y1="210" x2="390" y2="210"/>
    <line x1="130" y1="240" x2="350" y2="240"/>
  </g>

  <!-- Texto PDF -->
  <text x="256"
        y="330"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="110"
        font-weight="bold"
        fill="#e10600">
    PDF
  </text>

</svg>
