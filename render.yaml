# render.yaml
services:
  # ----------------------------
  # PRODUCCIÓN (main branch)
  # ----------------------------
  - type: web
    name: imec-del-norte-web  # Tu servicio de producción actual
    env: static
    repo: https://gitlab.com/imec.del.norte524/imec-del-norte-frontend.git
    branch: main  # ← RAMA MAIN
    buildCommand: |
      npm ci
      npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    autoDeploy: true
    # DOMINIO: https://imec-del-norte-web.onrender.com
    routes:
      # 1. API de PRODUCCIÓN
      - type: rewrite
        source: /api/*
        destination: https://imec-del-norte-backend-8ajs.onrender.com/api/:splat
      
      # 2. REGLA SPA (solución al 404)
      - type: rewrite
        source: /*
        destination: /index.html
    
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  # ----------------------------
  # SANDBOX (develop branch)
  # ----------------------------
  - type: web
    name: imec-del-norte-sandbox  # Tu servicio de sandbox actual
    env: static
    repo: https://gitlab.com/imec.del.norte524/imec-del-norte-frontend.git
    branch: develop  # ← RAMA DEVELOP
    buildCommand: |
      npm ci
      npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    autoDeploy: true
    # DOMINIO: https://imec-del-norte-sandbox.onrender.com
    routes:
      # 1. API de SANDBOX
      - type: rewrite
        source: /api/*
        destination: https://imec-del-norte-backend-sandbox.onrender.com/api/:splat
      
      # 2. MISMA REGLA SPA
      - type: rewrite
        source: /*
        destination: /index.html
    
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=86400